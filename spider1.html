<!DOCTYPE html>
<html lang="en-US">

<head>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@main/gdlite/">

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="description"
    content="Play Geometry Dash Lite Online For Free on Chromebook, PC, Windows, Desktop in Chrome and modern browsers.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="cf-2fa-verify" content="GpoihhhSRQknehLQkEtXM">

  <title>Geometry Dash Game</title>

  <link rel="icon" type="image/png"
    href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">

  <link rel="stylesheet"
    href="themes/geometrydashlite.io/rs/css/home.css?v=1">
</head>

<body>

<style>
html, body {
  margin: 0;
  overflow: hidden;
  background-image: linear-gradient(rgb(0,0,0), rgb(0,102,255));
}

#gameContainer {
  width: 100vw;
  height: 100vh;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}

#loader {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background-image: linear-gradient(rgb(0,0,0), rgb(0,102,255));
}

.spinner {
  border: 6px solid rgba(255,255,255,0.2);
  border-top: 6px solid #fff;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.progress {
  width: 300px;
  height: 10px;
  background: #333;
  margin-top: 20px;
}

.full {
  height: 100%;
  width: 0%;
  background: white;
}
</style>

<div id="gameContainer"></div>

<div id="loader">
  <div class="spinner"></div>
  <div class="progress">
    <div class="full"></div>
  </div>
</div>

<script>
window.fileMergerConfig = {
  files: [
    { name: 'GeometryDashLite.data.unityweb', parts: 2 },
    { name: 'GeometryDashLite.wasm.code.unityweb', parts: 1 },
    { name: 'GeometryDashLite.wasm.framework.unityweb', parts: 1 }
  ],
  basePath: 'Build/',
  debug: true
};
</script>

<!-- ✅ CORRECT ORDER -->
<script src="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@ac5cdfc0042aca584e72619375b4aca948a9243c/merge.js"></script>
<script src="Build/UnityLoader.js"></script>

<script>
var gameInstance = UnityLoader.instantiate(
  "gameContainer",
  "Build/GeometryDashLite.json",
  { onProgress: UnityProgress }
);

function UnityProgress(gameInstance, progress) {
  const loader = document.querySelector("#loader");
  const bar = document.querySelector(".full");

  bar.style.width = (progress * 100) + "%";

  if (progress === 1) {
    setTimeout(() => loader.style.display = "none", 1000);
  }
}
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  let buttons = document.getElementsByTagName('button');

  for (let i = 0; i < buttons.length; i++) {
    if (buttons[i].innerHTML === "OK") {
      buttons[i].click();
    }
  }
});
</script>

<script src="themes/geometrydashlite.io/rs/js/jquery-3.4.1.min.js"></script>

<script>
function ToggleInfo() {
  $("div.main-panel").toggle();
}
</script>

<img id="thumbnail" style="display:none">
</body>
</html>
